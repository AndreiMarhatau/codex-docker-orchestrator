services:
  orchestrator:
    image: "${ORCH_IMAGE:-ghcr.io/andreimarhatau/codex-docker-orchestrator:latest}"
    pull_policy: always
    container_name: codex-orchestrator
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ORCH_DATA_DIR: "/var/lib/codex-orchestrator"
      ORCH_DATA_VOLUME: "${ORCH_DATA_VOLUME:-codex-orchestrator-data}"
      ORCH_HOME: "/var/lib/codex-orchestrator/.codex-orchestrator"
      CODEX_HOME: "/var/lib/codex-orchestrator/.codex"
      GIT_CONFIG_GLOBAL: "/var/lib/codex-orchestrator/git/.gitconfig"
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      - ${ORCH_DATA_VOLUME:-codex-orchestrator-data}:/var/lib/codex-orchestrator

volumes:
  codex-orchestrator-data:
    name: "${ORCH_DATA_VOLUME:-codex-orchestrator-data}"
